<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>portfolio</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #090b11;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #090b11;
        transition: opacity 260ms ease;
      }

      #boot-loader.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .boot-loader-card {
        box-sizing: border-box;
        width: min(100% - 48px, 380px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        padding: 28px 24px;
        background: rgba(255, 255, 255, 0.03);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        color: #e9f8ff;
        font-family:
          Sora,
          "Space Grotesk",
          Inter,
          sans-serif;
      }

      .boot-loader-label {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: #c39449;
      }

      .boot-loader-title {
        margin: 12px 0 0;
        font-size: 30px;
        font-weight: 500;
        letter-spacing: -0.03em;
      }

      .boot-loader-copy {
        margin: 12px 0 0;
        font-size: 14px;
        line-height: 1.8;
        color: rgba(233, 248, 255, 0.58);
      }

      .boot-loader-bar {
        margin-top: 24px;
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }

      .boot-loader-bar::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #c39449 0%, #e9f8ff 100%);
        animation: boot-loader-slide 1.15s ease-in-out infinite alternate;
      }

      @keyframes boot-loader-slide {
        from {
          transform: translateX(-8%);
        }
        to {
          transform: translateX(135%);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-loader" aria-hidden="true">
      <div class="boot-loader-card">
        <div class="boot-loader-label">Loading Portfolio</div>
        <h1 class="boot-loader-title">Hampus Bosson</h1>
        <p class="boot-loader-copy">Preparing the 3D scene, project media, and interface.</p>
        <div class="boot-loader-bar"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
